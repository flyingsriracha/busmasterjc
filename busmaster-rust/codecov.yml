# BUSMASTER Codecov Configuration
# REQ-QUAL-003: cargo test passes with >80% coverage

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  
  status:
    project:
      default:
        # Target 80% coverage (REQ-QUAL-003)
        target: 80%
        threshold: 2%
        if_ci_failed: error
        
    patch:
      default:
        # New code should have good coverage
        target: 80%
        threshold: 5%
        if_ci_failed: error

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

flags:
  unittests:
    paths:
      - crates/
    carryforward: true
    
  integration:
    paths:
      - tests/
    carryforward: true

ignore:
  - "**/*_test.rs"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "target/**"
