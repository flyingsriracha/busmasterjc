# BUSMASTER Rust Coverage Workflow
#
# Generates detailed coverage reports and uploads to Codecov.
# REQ-QUAL-003: cargo test passes with >80% coverage

name: Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - 'source/busmaster-rust/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'source/busmaster-rust/**'

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: source/busmaster-rust

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/busmaster-rust/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      
      - name: Generate coverage report (LCOV)
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path lcov.info
      
      - name: Generate coverage report (HTML)
        run: |
          cargo llvm-cov --all-features --workspace \
            --html --output-dir coverage-html
      
      - name: Generate coverage summary
        run: |
          cargo llvm-cov --all-features --workspace \
            --text > coverage-summary.txt
          cat coverage-summary.txt
      
      - name: Check coverage threshold
        run: |
          # Extract total coverage percentage
          COVERAGE=$(cargo llvm-cov --all-features --workspace --json | \
            jq '.data[0].totals.lines.percent')
          echo "Total coverage: $COVERAGE%"
          
          # Check against 80% threshold (REQ-QUAL-003)
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::warning::Coverage ($COVERAGE%) is below 80% threshold"
          else
            echo "Coverage meets threshold!"
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: source/busmaster-rust/lcov.info
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            source/busmaster-rust/lcov.info
            source/busmaster-rust/coverage-html/
            source/busmaster-rust/coverage-summary.txt
          retention-days: 30

  # Coverage badge generation
  badge:
    name: Update Coverage Badge
    needs: coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
      
      # Badge will be generated by Codecov automatically
      - name: Coverage badge info
        run: |
          echo "Coverage badge is managed by Codecov"
          echo "Add badge to README: [![codecov](https://codecov.io/gh/rbei-etas/busmaster/branch/main/graph/badge.svg)](https://codecov.io/gh/rbei-etas/busmaster)"
